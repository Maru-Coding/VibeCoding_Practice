<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>마루설아 웹명함</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="card-wrap">
      <section class="card" aria-label="웹 명함">
        <div class="avatar" role="img" aria-label="프로필 캐릭터 이미지">
          <img class="avatar-image" src="./avatar.png" alt="캐릭터 프로필" />
        </div>

        <div class="content">
          <p class="label">WEB BUSINESS CARD</p>
          <h1 id="name">마루설아</h1>
          <p id="job">개발자 꿈나무 블로그</p>
          <p id="tagline">안녕하세요!</p>

          <ul class="contact-list">
            <li>
              <span class="key">Email</span>
              <a id="email" href="mailto:test@test.com">test@test.com</a>
            </li>
            <li>
              <span class="key">Link</span>
              <a
                id="blog"
                href="https://maruseol-a.tistory.com/"
                target="_blank"
                rel="noreferrer noopener"
                >Blog</a
              >
            </li>
          </ul>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
