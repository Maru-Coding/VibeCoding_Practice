<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>김태헌 웹 명함</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="card-wrap">
      <section class="card" aria-label="웹 명함">
        <div class="avatar" role="img" aria-label="캐릭터 얼굴">
          <div class="glasses">
            <span class="lens left"></span>
            <span class="bridge"></span>
            <span class="lens right"></span>
          </div>
          <div class="hair"></div>
          <div class="face">
            <span class="eye left"></span>
            <span class="eye right"></span>
            <span class="mouth"></span>
          </div>
          <div class="neck"></div>
          <div class="body"></div>
          <div class="jacket"></div>
        </div>

        <div class="content">
          <p class="label">WEB BUSINESS CARD</p>
          <h1 id="name">김태헌</h1>
          <p id="job">SideOnAI 대표</p>
          <p id="tagline">AI와 함께 놀고 있습니다. 같이 노실 분?</p>

          <ul class="contact-list">
            <li>
              <span class="key">Email</span>
              <a id="email" href="mailto:th@sideonai.com">th@sideonai.com</a>
            </li>
            <li>
              <span class="key">Phone</span>
              <a id="phone" href="tel:01011111111">010-1111-1111</a>
            </li>
            <li>
              <span class="key">Link</span>
              <div class="link-buttons">
                <a
                  id="linkedin"
                  class="social-btn linkedin-btn"
                  href="https://www.linkedin.com/"
                  target="_blank"
                  rel="noreferrer noopener"
                  >LinkedIn</a
                >
                <a
                  id="youtube"
                  class="social-btn youtube-btn"
                  href="https://www.youtube.com/@ai-study"
                  target="_blank"
                  rel="noreferrer noopener"
                  >YouTube</a
                >
              </div>
            </li>
          </ul>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
